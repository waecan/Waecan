name: Waecan CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test + Clippy + Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --workspace -- --nocapture 2>&1 | tee cargo-test.log
        continue-on-error: true

      - name: Upload Test Log
        uses: actions/upload-artifact@v4
        with:
          name: cargo-test-log
          path: cargo-test.log

      - name: Check Status
        run: |
          if grep -q "error: could not compile" cargo-test.log; then exit 1; fi
          if grep -q "test failed" cargo-test.log; then exit 1; fi
